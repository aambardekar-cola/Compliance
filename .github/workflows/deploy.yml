# ==============================================================================
# PaceCareOnline Compliance Intelligence Platform — GitHub Actions CI/CD
# ==============================================================================
# Triggers: push to main (dev + staging auto-deploy), manual dispatch (prod)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION              (default: us-east-2)
# ==============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - staging
          - demo
          - prod

# Prevent concurrent deployments
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================================================
  # LINT
  # ============================================================================
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check backend/
    continue-on-error: true

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci --no-audit --no-fund
      - run: cd frontend && npx eslint src/ --max-warnings=0 || true
    continue-on-error: true

  # ============================================================================
  # BUILD
  # ============================================================================
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Backend validation
      - name: Validate backend
        run: |
          pip install -r backend/requirements.txt
          cd backend
          python -c "from shared.config import Settings; print('Config OK')"
          python -c "from shared.models import Base; print('Models OK')"

      # Cache & Build Frontend
      - name: Cache frontend dist
        id: cache-frontend
        uses: actions/cache@v4
        with:
          path: frontend/dist
          key: frontend-dist-${{ hashFiles('frontend/src/**', 'frontend/package*.json', 'frontend/vite.config.js') }}

      - name: Build frontend
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

      # Cache & Build Backend Layer
      - name: Cache backend layer
        id: cache-backend
        uses: actions/cache@v4
        with:
          path: backend/layer
          key: backend-layer-${{ hashFiles('scripts/build-layer.sh', 'backend/requirements.txt') }}

      - name: Build backend layer
        if: steps.cache-backend.outputs.cache-hit != 'true'
        run: |
          bash scripts/build-layer.sh

      - name: Upload backend layer
        uses: actions/upload-artifact@v4
        with:
          name: backend-layer
          path: backend/layer/
          retention-days: 1

  # ============================================================================
  # DEPLOY: Dev (automatic on push to main)
  # ============================================================================
  deploy-dev:
    name: Deploy Dev
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      - name: Download backend layer
        uses: actions/download-artifact@v4
        with:
          name: backend-layer
          path: backend/layer/
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install dependencies
        run: |
          pip install aws-cdk-lib constructs boto3
          pip install -r infrastructure/requirements.txt
          npm install -g aws-cdk
      - name: CDK Deploy Explicit Descope Config
        run: |
          cd infrastructure
          cdk deploy --all -c env=dev -c "environments:dev:descope_project_id=${{ secrets.DESCOPE_PROJECT_ID_DEV }}" --require-approval never --outputs-file cdk-outputs.json
      - name: Inject Runtime Env Config
        run: |
          cd infrastructure
          API_URL=$(jq -r '.["pco-compliance-dev-api"].ApiUrl' cdk-outputs.json)
          SITE_BUCKET=$(jq -r '.["pco-compliance-dev-frontend"].SiteBucketName' cdk-outputs.json)
          echo "window.ENV = { API_URL: '${API_URL}' };" > env-config.js
          aws s3 cp env-config.js s3://${SITE_BUCKET}/env-config.js
      - name: Run DB migrations
        run: bash scripts/run-migrations.sh dev
      - name: Auto-Seed Dev Database
        run: |
          cd infrastructure
          MIGRATION_ARN=$(jq -r '.["pco-compliance-dev-data"].MigrationLambdaArn' cdk-outputs.json)
          FUNCTION_NAME=$(echo "$MIGRATION_ARN" | awk -F: '{print $NF}')
          aws lambda invoke --function-name "$FUNCTION_NAME" --payload '{"command": "seed"}' --cli-binary-format raw-in-base64-out --cli-read-timeout 300 out.json
          cat out.json
          if grep -q "error" out.json; then echo "Seeding Failed!"; exit 1; fi
      - name: Trigger Scraper Analysis
        run: |
          # Automatically trigger the scraper immediately so data is available on the Dashboard
          SCRAPER_ARN=$(aws lambda list-functions --query 'Functions[?contains(FunctionName, `ScraperHandler`) && contains(FunctionName, `pco-compliance-dev`)].FunctionName' --output text)
          if [ -n "$SCRAPER_ARN" ] && [ "$SCRAPER_ARN" != "None" ]; then
            aws lambda invoke --function-name "$SCRAPER_ARN" --invocation-type Event /dev/null
          fi
      - name: Invalidate CloudFront cache
        run: bash scripts/invalidate-cache.sh dev

